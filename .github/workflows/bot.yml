name: Mail Bot SK

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Restore bot state (processed_ids + clients)
        uses: actions/cache@v4
        with:
          path: |
            processed_ids.json
            clients_index.json
            clients/
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Ensure state files and folders exist
        run: |
          if [ ! -f processed_ids.json ]; then
            echo "[]" > processed_ids.json
          fi
          if [ ! -f clients_index.json ]; then
            echo '{"last_id":0,"by_email":{},"by_iban":{},"by_phone":{},"used_rf":[]}' > clients_index.json
          fi
          mkdir -p clients
          mkdir -p contracts

      - name: Debug current state (clients + index)
        run: |
          echo "=== clients_index.json ==="
          cat clients_index.json || echo "no index"
          echo "=== clients dir ==="
          ls -R clients || echo "no clients dir"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Mail Bot SK
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENT_FOLDER: ${{ secrets.SENT_FOLDER }}
          CRAFTMYPDF_API_KEY: ${{ secrets.CRAFTMYPDF_API_KEY }}
          CRAFTMYPDF_TEMPLATE_ID: ${{ secrets.CRAFTMYPDF_TEMPLATE_ID }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_ADMIN_NUMBER: ${{ secrets.WHATSAPP_ADMIN_NUMBER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_reply_sk.py
