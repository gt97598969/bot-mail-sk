name: Mail Bot SK

on:
  schedule:
    - cron: '*/10 * * * *'   # toutes les 10 minutes
  workflow_dispatch:          # lancement manuel possible

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Restore processed_ids cache
        uses: actions/cache/restore@v4
        with:
          path: processed_ids.json
          key: processed-ids

      - name: Create empty processed_ids.json if missing
        run: |
          if [ ! -f processed_ids.json ]; then
            echo "[]" > processed_ids.json
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Mail Bot SK
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
          CRAFTMYPDF_KEY: ${{ secrets.CRAFTMYPDF_KEY }}
          OLAKRED_API_KEY: ${{ secrets.OLAKRED_API_KEY }}
        run: python auto_reply_sk.py

      - name: Save processed_ids cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: processed_ids.json
          key: processed-ids
